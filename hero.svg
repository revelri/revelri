<svg xmlns="http://www.w3.org/2000/svg" width="840" height="200" viewBox="0 0 840 200">
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="840" height="4">
      <rect width="840" height="4" fill="transparent"/>
      <rect width="840" height="1" y="3" fill="rgba(106,107,246,0.06)"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="200" rx="12" ry="12" fill="#000" stroke="#6a6bf6" stroke-width="2"/>

  <!-- Scanlines overlay with flicker -->
  <rect width="840" height="200" rx="12" ry="12" fill="url(#scanlines)">
    <animate attributeName="opacity" values="0.95;1;0.97;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Terminal prompt: name // handle -->
  <text x="40" y="90" font-family="'Courier New', Courier, monospace" font-size="26" fill="#6bf1b6">
    &gt; sl revoy // revelri<tspan fill="#6bf1b6" font-size="26">
      <animate attributeName="opacity" values="0;1;0" dur="1.2s" repeatCount="indefinite"/>|</tspan>
  </text>

  <!-- Tagline -->
  <text x="40" y="120" font-family="'Courier New', Courier, monospace" font-size="13" fill="#4a9e7a"></text>

  <!-- Commit count (hero number) -->
  <text x="800" y="85" text-anchor="end" font-family="'Courier New', Courier, monospace" font-size="32" fill="#f5e642" filter="url(#glow)">115</text>
  <text x="800" y="108" text-anchor="end" font-family="'Courier New', Courier, monospace" font-size="13" fill="#4a9e7a">commits / 7d</text>

  <!-- Time since last commit -->
  <text x="800" y="130" text-anchor="end" font-family="'Courier New', Courier, monospace" font-size="13" fill="#4a9e7a">34m ago</text>
</svg>
