name: Update profile cards

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate SVG cards
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scripts/generate_cards.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || {
            git add hero.svg stats.svg activity.svg
            git commit -m "Update profile cards"
            git push
          }
