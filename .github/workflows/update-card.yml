name: Update profile cards

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-card
  cancel-in-progress: true

jobs:
  update-card:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -q playwright Pillow websockets
          .venv/bin/python3 -m playwright install chromium

      - name: Generate SVG card
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          ZEITGEIST_DIR: ${{ vars.ZEITGEIST_DIR || '/home/revelri/Dev/Pipeline/Building/ascii/zeitgeist' }}
        run: .venv/bin/python3 scripts/generate_cards.py

      - name: Render APNG from SVG
        run: .venv/bin/python3 scripts/render_apng.py

      - name: Commit card if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet card.svg card.png 2>/dev/null || {
            git add card.svg card.png
            git commit -m "Update profile card"
            git pull --rebase origin main
            git push
          }

  update-hero:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -q websockets

      - name: Generate hero SVG
        env:
          ZEITGEIST_DIR: ${{ vars.ZEITGEIST_DIR || '/home/revelri/Dev/Pipeline/Building/ascii/zeitgeist' }}
        run: .venv/bin/python3 scripts/generate_hero.py

      - name: Commit SVG if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet hero.svg || {
            git add hero.svg
            git commit -m "Update hero SVG"
            git pull --rebase origin main
            git push
          }

