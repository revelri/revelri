name: Update profile cards

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate SVG card
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scripts/generate_cards.py

      - name: Commit card if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet card.svg || {
            git add card.svg
            git commit -m "Update profile card"
            git push
          }

  update-hero:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -q websockets

      - name: Generate hero SVG
        env:
          EMOTION_HERO_DIR: ${{ vars.EMOTION_HERO_DIR || '/home/revelri/Dev/Pipeline/Building/ascii/emotion-hero' }}
        run: .venv/bin/python3 scripts/generate_hero.py

      - name: Commit SVG if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git diff --quiet hero.svg || {
            git add hero.svg
            git commit -m "Update hero SVG"
            git push
          }

