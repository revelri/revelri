name: Update profile cards

on:
  schedule:
    # Every 30 min, off the top-of-hour contention window GitHub warns about.
    # A local systemd timer (profile-card.timer) is the primary trigger; this
    # cron is a best-effort fallback since GitHub drops scheduled events.
    - cron: '7,37 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-card
  cancel-in-progress: false

jobs:
  update-card:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-card-venv-playwright-pillow-websockets-v1

      - name: Setup venv
        run: |
          if [ ! -d .venv ]; then
            python3 -m venv .venv
            .venv/bin/pip install -q playwright Pillow websockets
          fi
          .venv/bin/python3 -m playwright install chromium

      - name: Generate SVG card
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          ZEITGEIST_DIR: ${{ vars.ZEITGEIST_DIR || '/home/revelri/Dev/revelri/zeitgeist' }}
        run: .venv/bin/python3 scripts/generate_cards.py

      - name: Render APNG from SVG
        run: .venv/bin/python3 scripts/render_apng.py

      - name: Commit card if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet card.svg card.png 2>/dev/null || {
            # Bust GitHub camo image-proxy cache by versioning the README image
            # URL with a build timestamp. Without this, profile viewers see a
            # stale render via camo for hours after the card is regenerated.
            ts=$(date -u +%s)
            sed -i -E "s|!\\[Profile\\]\\(card\\.png(\\?v=[0-9]+)?\\)|![Profile](card.png?v=${ts})|" README.md
            git add card.svg card.png README.md
            git diff --cached --quiet && exit 0
            git commit -m "Update profile card"
            # Retry push under contention from concurrent CI runs (binary
            # card.png rebases otherwise conflict).
            for attempt in 1 2 3; do
              if git push; then exit 0; fi
              echo "push attempt $attempt failed; rebasing..."
              # Prefer OUR freshly-generated card on binary conflicts.
              git pull --rebase --autostash -X ours origin main || git rebase --abort || true
            done
            echo "push failed after 3 attempts" >&2
            exit 1
          }

  update-hero:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv-hero
          key: ${{ runner.os }}-hero-venv-websockets-v1

      - name: Setup venv
        run: |
          if [ ! -d .venv-hero ]; then
            python3 -m venv .venv-hero
            .venv-hero/bin/pip install -q websockets
          fi

      - name: Generate hero SVG
        env:
          ZEITGEIST_DIR: ${{ vars.ZEITGEIST_DIR || '/home/revelri/Dev/revelri/zeitgeist' }}
        run: .venv-hero/bin/python3 scripts/generate_hero.py

      - name: Commit SVG if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet hero.svg || {
            git add hero.svg
            git commit -m "Update hero SVG"
            git pull --rebase origin main
            git push
          }
