name: Update profile cards

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-card
  cancel-in-progress: false

jobs:
  update-card:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-card-venv-playwright-pillow-websockets-v1

      - name: Setup venv
        run: |
          if [ ! -d .venv ]; then
            python3 -m venv .venv
            .venv/bin/pip install -q playwright Pillow websockets
          fi
          .venv/bin/python3 -m playwright install chromium

      - name: Generate SVG card
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          ZEITGEIST_DIR: ${{ vars.ZEITGEIST_DIR || '/home/revelri/Dev/Building/Personal/zeitgeist' }}
        run: .venv/bin/python3 scripts/generate_cards.py

      - name: Render APNG from SVG
        run: .venv/bin/python3 scripts/render_apng.py

      - name: Commit card if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet card.svg card.png 2>/dev/null || {
            git add card.svg card.png
            git commit -m "Update profile card"
            git pull --rebase origin main
            git push
          }

  update-hero:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv-hero
          key: ${{ runner.os }}-hero-venv-websockets-v1

      - name: Setup venv
        run: |
          if [ ! -d .venv-hero ]; then
            python3 -m venv .venv-hero
            .venv-hero/bin/pip install -q websockets
          fi

      - name: Generate hero SVG
        env:
          ZEITGEIST_DIR: ${{ vars.ZEITGEIST_DIR || '/home/revelri/Dev/Building/Personal/zeitgeist' }}
        run: .venv-hero/bin/python3 scripts/generate_hero.py

      - name: Commit SVG if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet hero.svg || {
            git add hero.svg
            git commit -m "Update hero SVG"
            git pull --rebase origin main
            git push
          }
